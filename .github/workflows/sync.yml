name: Moodle Bot - Daily Sync

on:
  schedule:
    - cron: "0 8 * * *" # runs daily at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: moodle-sync
  cancel-in-progress: true

jobs:
  moodle-sync:
    name: Run Moodle sync
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      #   DB_HOST: ${{ secrets.DB_HOST }}
      #   DB_DATABASE: ${{ secrets.DB_DATABASE }}
      #   DB_USERNAME: ${{ secrets.DB_USERNAME }}
      #   DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
      MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
      APP_ENV: production
      APP_DEBUG: "false"
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP 8.3 and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none
          extensions: mbstring,xml,dom,pdo_pgsql

      - name: Validate PHP and extensions
        run: php -v && php -m

      - name: Set environment variables
        run: |
          echo "DB_CONNECTION=pgsql" >> $GITHUB_ENV
          echo "DB_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> $GITHUB_ENV
          echo "MOODLE_USERNAME=${{ secrets.MOODLE_USERNAME }}" >> $GITHUB_ENV
          echo "MOODLE_PASSWORD=${{ secrets.MOODLE_PASSWORD }}" >> $GITHUB_ENV

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-suggest --no-scripts

      - name: Run Moodle sync
        run: php artisan app:moodle-sync --verbose
        timeout-minutes: 30
